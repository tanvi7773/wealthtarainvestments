<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investments</title>

  <style>
    body {
      background: #0b1220;
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* Top-left Get Started Button */
    .cta-button {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: #FFD700; /* gold */
      color: #000;         /* black text */
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cta-button:hover {
      background: #FFC107; /* darker gold on hover */
      transform: scale(1.05);
    }

    .container {
      padding: 100px 8%;
    }

    h1 {
      font-size: 60px;
      color: #FFFFFF;
    }

    .card {
      background: #111827;
      padding: 30px;
      margin-top: 30px;
      border-radius: 20px;
    }

    .card h2 {
      color: #D4AF37; /* gold accent */
    }

    .card p {
      color: #E0E0E0;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <!-- Get Started Button at Top Left -->
  <a href="index.html" class="cta-button">Home Page</a>

  <div class="container">
    <h1>Investment Solutions</h1>

    <div class="card">
      <h2>Mutual Funds</h2>
      <p>Professionally managed investment solutions for long-term financial growth.</p>

      <h2>Equity Investments</h2>
      <p>Strategic stock investments designed to maximize returns responsibly.</p>
    </div>
  </div>

</body>
</html>
