<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>
    body {
      background: #0b1220;
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* Top-left Get Started Button */
    .cta-button {
      position: fixed; /* stays visible even when scrolling */
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: #FFD700; /* gold */
      color: #000;         /* black text */
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 1000; /* ensures it stays above other elements */
    }

    .cta-button:hover {
      background: #FFC107; /* darker gold on hover */
      transform: scale(1.05);
    }

    .container {
      padding: 100px 8%;
    }

    h1 {
      font-size: 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 20px;
    }

    .box h2 {
      color: #2E8B57; /* green accent */
    }

    .box p {
      color: #E0E0E0;
    }
  </style>
</head>
<body>

  <!-- Get Started Button at Top Left -->
  <a href="index.html" class="cta-button">Home Page</a>

  <div class="container">
    <h1>Our Portfolio</h1>

    <div class="grid">
      <div class="box">
        <h2><b><u>Stocks</u></b></h2>
        <p>Diversified Equity portfolios tailored to growth goals.</p>
      </div>

      <div class="box">
        <h2><b><u>Mutual Funds</u></b></h2>
        <p>Diversified Mutual fund investment for secured wealth generation.</p>
      </div>
    </div>
  </div>

</body>
</html>
