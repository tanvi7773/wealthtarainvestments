<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Wealth Tara</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0b1220;
      color: white;
      font-family: 'Poppins', sans-serif;
    }

    /* Top-left Get Started Button */
    .cta-button {
      position: fixed; /* stays visible even when scrolling */
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: #FFD700; /* gold */
      color: #000;         /* black text */
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 1000; /* ensures it stays above other elements */
    }

    .cta-button:hover {
      background: #FFC107; /* darker gold on hover */
      transform: scale(1.05);
    }

    .container {
      padding: 120px 8%;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      margin-bottom: 20px;
    }

    p {
      color: #E0E0E0;
      line-height: 1.8;
    }

    form {
      margin-top: 40px;
      max-width: 600px;
    }

    input, textarea {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
    }

    button {
      padding: 15px 35px;
      border: none;
      background: #D4AF37;
      color: #0A1F44;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Get Started Button at Top Left -->
  <a href="index.html" class="cta-button">Home Page</a>

  <div class="container">
    <h1>Contact Us</h1>

    <p>
      Reach out to Wealth Tara Investments for financial guidance and investment solutions.
    </p>

    <h3>WHATSAPP: +91 - 9527210312 </h3>
    <br>
    Follow Mangesh N Kunjir on X -
    <a href="https://x.com/mangeshnkunjir" target="_blank" rel="noopener noreferrer">x link</a>
  </div>

</body>
</html>
